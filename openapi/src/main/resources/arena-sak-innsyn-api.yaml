openapi: 3.0.3
info:
  title: Arena sak innsyn API
  description: API for innsyn i saker i Arena. Dette er et internt API som brukes av Arena innsynsklienten.
  version: 1.0.0
  contact:
    name: "#team-dagpenger"
servers:
  - url: https://dp-arena-gw.intern.dev.nav.no
    description: dev
#  - url: https://dp-arena.intern.nav.no
#    description: prod
paths:
  /arena/innsyn/person:
    post:
      summary: Hent personId for en person
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentForesporsel"
      tags:
        - Arena innsyn
      security:
        - azureAd: [ ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonIdResponse"
        default:
          description: Feil ved henting av personId
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HttpProblem"

  /arena/innsyn/person/{personId}:
    get:
      summary: Hent personinformasjon for en person
      parameters:
        - name: personId
          in: path
          required: true
          schema:
            type: integer
      tags:
        - Arena innsyn
      security:
        - azureAd: [ ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArenaPersonResponse"
        default:
          description: Feil ved henting av personinformasjon
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HttpProblem"

  /arena/innsyn/sak/person/{personId}:
    get:
      summary: Hent alle saker for en person
      parameters:
        - name: personId
          in: path
          required: true
          schema:
            type: integer
      tags:
        - Arena innsyn
      security:
        - azureAd: [ ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                default: []
                items:
                  $ref: "#/components/schemas/ArenaSakResponse"
        default:
          description: Feil ved henting av saker
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HttpProblem"

  /arena/innsyn/sak/{sakid}/detaljert:
    get:
      summary: Hent detaljert informasjon om en sak på sakId
      parameters:
        - name: sakid
          in: path
          required: true
          schema:
            type: string
      tags:
        - Arena innsyn
      security:
        - azureAd: [ ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArenaSakDetaljerResponse"
        "404":
          description: Sak ikke funnet
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HttpProblem"
        default:
          description: Feil ved henting av sak
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HttpProblem"

  /arena/innsyn/sak/{aar}/{lopenummer}/detaljert:
    get:
      summary: Hent detaljert informasjon om en sak på saksnummer
      parameters:
        - name: aar
          in: path
          required: true
          schema:
            type: string
        - name: lopenummer
          in: path
          required: true
          schema:
            type: string
      tags:
        - Arena innsyn
      security:
        - azureAd: [ ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArenaSakDetaljerResponse"
        "404":
          description: Sak ikke funnet
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HttpProblem"
        default:
          description: Feil ved henting av sak
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/HttpProblem"

components:
  schemas:

    ArenaSakResponse:
      type: object
      properties:
        sakId:
          type: string
        opprettetAar:
          type: string
        lopenr:
          type: integer
        statuskode:
          type: string
        statusnavn:
          type: string
        registrertDato:
          type: string
          format: date-time
        avsluttetDato:
          type: string
          format: date-time

    ArenaSakDetaljerResponse:
      type: object
      properties:
        sakId:
          type: string
        opprettetAar:
          type: string
        lopenr:
          type: integer
        person:
          $ref: "#/components/schemas/ArenaPersonResponse"
        statuskode:
          type: string
        statusnavn:
          type: string
        registrertDato:
          type: string
          format: date-time
        avsluttetDato:
          type: string
          format: date-time
        vedtak:
          type: array
          default: []
          items:
            $ref: "#/components/schemas/ArenaVedtakMedDetaljerResponse"
        telleverkForPerson:
          $ref: "#/components/schemas/TelleverkForPersonResponse"
        kvoteHistorikk:
          type: array
          default: []
          items:
            $ref: "#/components/schemas/KvotebrukHendelseResponse"
        sisteUtbetalingDato:
          type: string
          format: date
      required:
        - sakid
        - opprettetAar
        - lopenr
        - person
        - statuskode
        - statusnavn
        - registrertDato

    ArenaPersonResponse:
      type: object
      properties:
        personId:
          type: integer
        fodselsnummer:
          type: string
        fornavn:
          type: string
        etternavn:
          type: string
      required:
        - personId
        - fodselsnummer
        - fornavn
        - etternavn

    ArenaVedtakMedDetaljerResponse:
      type: object
      properties:
        vedtakId:
          type: integer
        lopenrvedtak:
          type: integer
        statusKode:
          type: string
        statusNavn:
          type: string
        vedtaktypeKode:
          type: string
        vedtaktypeNavn:
          type: string
        aktivitetsfaseKode:
          type: string
        aktivitetsfaseNavn:
          type: string
        fraOgMed:
          type: string
          format: date
        tilDato:
          type: string
          format: date
        rettighetkode:
          type: string
        rettighetnavn:
          type: string
        utfallkode:
          type: string
        begrunnelse:
          type: string
        saksbehandler:
          type: string
        beslutter:
          type: string
        relatertVedtak:
          type: integer
        fakta:
          type: array
          default: []
          minItems: 0
          items:
            $ref: "#/components/schemas/ArenaVedtakfaktaResponse"
        vilkårsvurderinger:
          type: array
          default: []
          items:
            $ref: "#/components/schemas/ArenaVilkarsvurderingResponse"
      required:
        - lopenrvedtak

    TelleverkForPersonResponse:
      type: object
      properties:
        dagpengePeriodeTeller:
          type: integer
        maxPeriodePermittertTellerFisk:
          type: integer
        maxPeriodePermittertTeller:
          type: integer
      required:
        - dagpengePeriodeTeller

    KvotebrukHendelseResponse:
      type: object
      properties:
        id:
          type: integer
        kvoteTypeKode:
          type: string
        endringsGrunnlag:
          type: string
        antallBevegelse:
          type: integer
        posteringTypeKode:
          type: string
        datoHendelse:
          type: string
          format: date
        resterende:
          type: integer
        modUser:
          type: string
        begrunnelse:
          type: string
      required:
        - id
        - kvoteTypeKode
        - endringsGrunnlag
        - antallBevegelse
        - posteringTypeKode
        - datoHendelse
        - resterende

    ArenaVedtakfaktaResponse:
      type: object
      properties:
        kode:
          type: string
        navn:
          type: string
        verdi:
          type: string
        registrertDato:
          type: string
          format: date
      required:
        - kode
        - navn
        - registrertDato

    ArenaVilkarsvurderingResponse:
      type: object
      properties:
        vilkårsvurderingId:
          type: integer
          format: int64
        vilkårkode:
          type: string
        begrunnelse:
          type: string
        vurdertAv:
          type: string
        vilkårnavn:
          type: string
        erObligatorisk:
          type: boolean
        hjelpetekstUrl:
          type: string
        lovtekstUrl:
          type: string
        rundskrivUrl:
          type: string
        statuskode:
          type: string
        statusnavn:
          type: string
      required:
        - vilkårsvurderingId
        - vilkårkode
        - vilkårnavn
        - erObligatorisk
        - statuskode
        - statusnavn

    PersonIdResponse:
      description:
        Unik identifikator for en person i Arena.
      type: object
      properties:
        id:
          type: integer
      required:
        - id

    IdentForesporsel:
      type: object
      required:
        - ident
      properties:
        ident:
          description: Fødselsnummer eller D-nummer til en person. Må være 11 siffer.
          type: string
          pattern: "^[0-9]{11}$"

    HttpProblem:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          description: A URI reference [RFC3986] that identifies the problem type. This specification encourages that, when dereferenced, it provide human-readable documentation for the problem type
        title:
          type: string
          description: A short, human-readable summary of the problem type. It SHOULD NOT change from occurrence to occurrence of the problem, except for purposes of localization
        status:
          type: integer
          description: The HTTP status code ([RFC7231], Section 6) generated by the origin server for this occurrence of the problem
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem
        instance:
          type: string
          format: uri
          description: A URI reference that identifies the specific occurrence of the problem. It may or may not yield further information if dereferenced
      additionalProperties: true

  securitySchemes:
    azureAd:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bruker [AzureAD](https://docs.nais.io/security/auth/azure-ad) til autentisering. 
        Token må ha `audience` satt til `[cluster].teamdagpenger.dp-arena-gw`.
        
        For å teste APIet kan du lage et gyldig OBO-token ved å bruke wonderwalled:
        - [dev-fss](https://azure-token-generator.intern.dev.nav.no/api/obo?aud=dev-fss.teamdagpenger.dp-arena-gw)
